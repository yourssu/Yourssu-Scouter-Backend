# 로컬 코드 + dev DB 사용 시 이 프로필을 추가합니다.
# 사용: --spring.profiles.active=local,local-dev-db
# .env.local 에 DB_URL, DB_USERNAME, DB_PASSWORD (dev DB 접속 정보) 설정 필요.
#
# Flyway: 이미 적용된 마이그레이션 파일(V8 등)을 수정하면 체크섬 불일치로 기동 실패할 수 있습니다.
#   ./scripts/flyway-with-dev-db-env.sh flywayRepair
# (의도적으로 수정한 경우에만; 공유 DB면 팀 합의 후 실행)
#
# 멤버 엑셀 다운로드(HTML 비밀번호): MEMBER_EXCEL_DOWNLOAD_PASSWORD 환경변수 또는 application.yml 의 scouter.member-excel-tool.download-password
#
# 운영(prod) DB URL을 .env.local 에 넣지 마세요. 예약 메일 스케줄러는 local 프로필에서 기본 OFF입니다.
# 로컬에서 스케줄러까지 켜려면 app.mail.scheduler.enabled=true 로 명시하세요.
app:
  mail:
    scheduler:
      enabled: false

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC
