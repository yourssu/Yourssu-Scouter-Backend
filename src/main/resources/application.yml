management:
  endpoint:
    health:
      show-details: never  # UP/DOWN만 노출, DB 등 상세 정보 비공개
  endpoints:
    web:
      exposure:
        include: health

spring:
  application:
    name: scouter
  jackson:
    serialization:
      write-dates-as-timestamps: false
  profiles:
    default: local
  config:
    import:
      - applicant-sync-mapping-data.yml
      - member-parse-mapping-data.yml
      - applicant-available-time-map.yml
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

# 멤버 인포 엑셀 다운로드: 비어 있으면 비밀번호 없이는 Bearer+특권만 허용. 값을 두면 HTML에서 입력한 비밀번호로도 다운로드 가능.
scouter:
  member-excel-tool:
    download-password: ${MEMBER_EXCEL_DOWNLOAD_PASSWORD:}

mail:
  storage:
    s3:
      bucket: ${MAIL_STORAGE_S3_BUCKET:}
      region: ${MAIL_STORAGE_S3_REGION:}
      key-prefix: ${MAIL_STORAGE_S3_KEY_PREFIX:mail-files}
