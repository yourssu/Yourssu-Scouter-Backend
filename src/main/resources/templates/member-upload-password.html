<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>업로드 페이지 인증</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 520px;">
    <h4 class="mb-3">멤버 업로드 페이지 인증</h4>
    <p class="text-muted small mb-3">업로드 페이지 접근 전 비밀번호 인증이 필요합니다.</p>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form method="post" action="/members/upload/auth" class="border p-4 rounded">
        <div class="mb-3">
            <label for="toolPassword" class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="toolPassword" name="toolPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">입장</button>
    </form>
</div>
</body>
</html>
