<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>멤버 인포 엑셀 업로드 및 다운로드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">엑셀 파일 업로드 및 다운로드</h2>

    <!-- 성공 메시지 -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- 오류 메시지 -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- 업로드 폼 -->
    <form method="post" action="/members/include-from-excel" enctype="multipart/form-data" class="border p-4 mb-4">
        <div class="mb-3">
            <label for="file" class="form-label">엑셀 파일 선택:</label>
            <input type="file" class="form-control" id="file" name="file" accept=".xlsx" required>
        </div>
        <button type="submit" class="btn btn-primary">업로드</button>
    </form>

    <!-- 다운로드 버튼 -->
    <div>
        <a href="/members/download-to-excel" class="btn btn-success">멤버 정보 다운로드</a>
    </div>
</div>
</body>
</html>
