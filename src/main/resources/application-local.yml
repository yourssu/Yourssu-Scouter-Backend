spring:
  application:
    name: scouter
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        use_sql_comments: true
    open-in-view: false
  cors:
    allowed-origins:
      - http://localhost:5173
token:
  jwt:
    access-key: ${JWT_ACCESS_KEY}
    refresh-key: ${JWT_REFRESH_KEY}
    access-expired-hours: 1 # 1시간
    refresh-expired-hours: 336  # 14일
oauth2:
  google:
    client_id: ${GOOGLE_OAUTH_CLIENT_ID} # 환경변수에서 주입
    client_secret: ${GOOGLE_OAUTH_CLIENT_SECRET} # 환경변수에서 주입
    redirect-path: /oauth/callback/google
    allowed_redirect_uris:
      - ${ALLOWED_REDIRECT_URI_LOCAL}
      - ${ALLOWED_REDIRECT_URI_DEV}
      - ${SWAGGER_OAUTH2_REDIRECT_URL}
    scope:
      - openid
      - https://www.googleapis.com/auth/userinfo.email
      - https://www.googleapis.com/auth/userinfo.profile
      - https://www.googleapis.com/auth/drive.readonly
      - https://www.googleapis.com/auth/forms.responses.readonly
      - https://www.googleapis.com/auth/gmail.send
domain: http://localhost:8080

springdoc:
  swagger-ui:
    syntax-highlight:
      theme: arta # syntax highlight theme
    doc-expansion: none # 기본으로 접기
    operations-sorter: method # 정렬 방식
    tags-sorter: alpha
    oauth:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    oauth2-redirect-url: ${SWAGGER_OAUTH2_REDIRECT_URL}
